# MediaMTX config owned by pksp edge (bundled binary under apps/edge/bin/mediamtx)
# Static publisher-only paths — inject sources via the Rust supervisor or MTX_* env.
logLevel: info
api: yes
apiAddress: :9997

rtsp: yes
rtspAddress: :8554
rtspTransports: [tcp]
rtmp: yes
rtmpAddress: :1935
hls: yes
hlsAddress: :8888
webrtc: yes
webrtcAddress: :8889
webrtcLocalUDPAddress: :8189
# Same-host default. For remote LAN browsers set MTX_WEBRTCADDITIONALHOSTS to the
# appliance LAN address (never guess interfaces in application code).
webrtcAdditionalHosts: [127.0.0.1]
# Disable unused listeners (defaults would open extra host ports).
srt: no
playback: no
metrics: no
pprof: no

paths:
  demo:
    source: publisher

  cam_in:
    source: publisher

  # Browser-safe H.264 path (ffmpeg publishes RTMP here in copy/transcode mode)
  cam_in_h264:
    source: publisher

  cam_out:
    source: publisher
