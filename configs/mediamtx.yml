# MediaMTX — RTSP in, WebRTC/HLS out for browser + vision
# Docs: https://github.com/bluenviron/mediamtx
# Static publisher-only paths. Container mode needs an external publisher when
# the Rust supervisor is not running. Do not embed shell interpolation or
# credential-bearing URLs in this file.

logLevel: info
api: yes
apiAddress: :9997

rtsp: yes
rtspAddress: :8554
rtspTransports: [tcp]
rtmp: yes
rtmpAddress: :1935
hls: yes
hlsAddress: :8888
webrtc: yes
webrtcAddress: :8889
webrtcLocalUDPAddress: :8189
# Same-host default. For remote LAN browsers override with:
#   MTX_WEBRTCADDITIONALHOSTS=192.168.x.x
webrtcAdditionalHosts: [127.0.0.1]
srt: no
playback: no
metrics: no
pprof: no

paths:
  demo:
    source: publisher

  cam_in:
    source: publisher

  cam_in_h264:
    source: publisher

  cam_out:
    source: publisher
