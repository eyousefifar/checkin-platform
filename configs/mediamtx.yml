# MediaMTX — RTSP in, WebRTC/HLS out for browser + vision
# Docs: https://github.com/bluenviron/mediamtx

logLevel: info
api: yes
apiAddress: :9997

rtsp: yes
rtspAddress: :8554
rtmp: yes
rtmpAddress: :1935
hls: yes
hlsAddress: :8888
webrtc: yes
webrtcAddress: :8889
# Host candidates for LAN WebRTC (override if needed)
# webrtcAdditionalHosts: [192.168.1.10]

paths:
  # Demo path: publish with scripts/demo_rtsp.sh (ffmpeg)
  demo:
    source: publisher

  cam_in:
    # Highest quality feed (2560x1440 H.265) when IP_CAMERA_* are set in .env.
    # docker-compose loads .env so ${...} substitution works.
    source: rtsp://${IP_CAMERA_USER}:${IP_CAMERA_PASS}@${CAM_IP:-10.39.45.167}:554/${CAM_HIGH_QUALITY_PATH:-stream1}
    # Fallback comment for manual edit if substitution not desired:
    # source: rtsp://admin:campkspQq123@10.39.45.167:554/stream1

  cam_out:
    source: publisher
