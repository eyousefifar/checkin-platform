services:
  mediamtx:
    image: bluenviron/mediamtx:1.11.3
    ports:
      - "8554:8554"   # RTSP (TCP; config sets rtspTransports: [tcp])
      - "1935:1935"   # RTMP
      - "8888:8888"   # HLS
      - "8889:8889"   # WebRTC HTTP
      - "8189:8189/udp"  # WebRTC media
      - "9997:9997"   # API
    volumes:
      - ./configs/mediamtx.yml:/mediamtx.yml:ro
    restart: unless-stopped
